name = "erp-web"
description = "TEC.ERP React SPA (RC00 platform foundation)"

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=erp-web"

[deploy]
startCommand = "pnpm --filter erp-web start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
NODE_ENV = "production"
