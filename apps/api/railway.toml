name = "erp-api"
description = "TEC.ERP Express API service (RC00 platform foundation)"

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=erp-api"

[deploy]
startCommand = "pnpm migrate:deploy && node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
NODE_ENV = "production"
LOG_LEVEL = "info"
