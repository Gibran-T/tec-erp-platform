name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type deploy-staging to confirm Railway staging deployment"
        required: true
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  validate-input:
    name: Confirm deployment intent
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation token
        if: inputs.confirm != 'deploy-staging'
        run: |
          echo "Confirmation token mismatch. Expected: deploy-staging"
          exit 1

  deploy:
    name: Railway staging deploy (manual)
    runs-on: ubuntu-latest
    needs: validate-input
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-deploy quality gate
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm env:check

      - name: Deploy erp-api to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_ERP_API_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "Railway secrets not configured — staging deploy skipped (RC00 scaffold)."
            exit 0
          fi
          npm install -g @railway/cli
          railway up --service "$RAILWAY_SERVICE_ID" --detach

      - name: Deploy erp-web to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_ERP_WEB_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "Railway secrets not configured — staging deploy skipped (RC00 scaffold)."
            exit 0
          fi
          npm install -g @railway/cli
          railway up --service "$RAILWAY_SERVICE_ID" --detach

      - name: Post-deploy smoke tests
        env:
          SMOKE_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          SMOKE_WEB_BASE_URL: ${{ secrets.STAGING_WEB_BASE_URL }}
        run: |
          if [ -z "$SMOKE_API_BASE_URL" ] || [ -z "$SMOKE_WEB_BASE_URL" ]; then
            echo "Staging smoke URLs not configured — smoke tests skipped (RC00 scaffold)."
            exit 0
          fi
          pnpm smoke:test
