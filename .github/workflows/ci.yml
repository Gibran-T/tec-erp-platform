name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build · Env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Environment catalog check
        run: pnpm env:check

  integration:
    name: Database migration · Integration
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tec
          POSTGRES_PASSWORD: tec
          POSTGRES_DB: tec_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tec -d tec_erp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tec:tec@localhost:5432/tec_erp_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build database and API packages
        run: pnpm turbo build --filter=@tec-platform/database-erp --filter=erp-api

      - name: Apply Prisma migrations
        run: pnpm migrate:deploy

      - name: Seed NORDHABITAT demo fixture
        run: pnpm --filter @tec-platform/database-erp seed

      - name: Integration tests
        run: pnpm --filter erp-api exec vitest run src/__tests__/integration/database.test.ts src/__tests__/integration/first-day-foundation.test.ts src/__tests__/integration/mission-discovery.test.ts
